<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC5 Fight Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #d4a574;
            --accent-dark: #9b7653;
            --border: #30363d;
            --success: #3fb950;
            --error: #f85149;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'IBM Plex Sans', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            margin-bottom: 60px;
            animation: headerSlideIn 0.8s ease-out;
        }

        @keyframes headerSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
            padding: 30px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            animation: statsSlideIn 1s ease-out 0.2s both;
        }

        @keyframes statsSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }

        /* Video Card */
        .video-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardFadeIn 0.6s ease-out both;
        }

        .video-card:nth-child(1) { animation-delay: 0.1s; }
        .video-card:nth-child(2) { animation-delay: 0.2s; }
        .video-card:nth-child(3) { animation-delay: 0.3s; }
        .video-card:nth-child(4) { animation-delay: 0.4s; }
        .video-card:nth-child(5) { animation-delay: 0.5s; }
        .video-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 12px 32px rgba(212, 165, 116, 0.15);
        }

        .video-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(212, 165, 116, 0.08), transparent);
            pointer-events: none;
        }

        .play-button {
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 16px solid var(--bg-primary);
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            margin-left: 3px;
        }

        .video-card:hover .play-button {
            background: var(--accent-dark);
            transform: scale(1.1);
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'IBM Plex Mono', monospace;
            gap: 12px;
        }

        .video-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .video-size {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
            font-weight: 500;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 900px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .modal-video video {
            width: 100%;
            height: 100%;
        }

        .modal-info {
            padding: 30px;
            border-top: 1px solid var(--border);
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-meta-item {
            display: flex;
            flex-direction: column;
        }

        .modal-meta-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal-meta-value {
            font-size: 0.95rem;
            color: var(--accent);
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 1001;
        }

        .close-button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Error Message */
        .error-message {
            padding: 16px;
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--error);
            border-radius: 4px;
            color: #ff8a80;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .success-message {
            padding: 16px;
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid var(--success);
            border-radius: 4px;
            color: #56d364;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: 'IBM Plex Mono', monospace;
            border-top: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .videos-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .modal-content {
                border-radius: 0;
            }

            .modal-info {
                padding: 20px;
            }

            .modal-title {
                font-size: 1.3rem;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>UFC5</h1>
            <p>Fight Archive</p>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalVideos">0</div>
                <div class="stat-label">Fights Recorded</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalSize">0 GB</div>
                <div class="stat-label">Storage Used</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lastUpdated">—</div>
                <div class="stat-label">Last Updated</div>
            </div>
        </div>

        <!-- Messages -->
        <div id="messageContainer"></div>

        <!-- Content -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="videosGrid" class="videos-grid" style="display: none;"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">📹</div>
            <div class="empty-state-text">No fights recorded yet. Check back soon!</div>
        </div>
    </div>

    <!-- Video Player Modal -->
    <div id="playerModal" class="modal">
        <button class="close-button" onclick="closeModal()">&times;</button>
        <div class="modal-content">
            <div class="modal-video">
                <video id="videoPlayer" controls></video>
            </div>
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-meta">
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Uploaded</div>
                        <div class="modal-meta-value" id="modalDate"></div>
                    </div>
                    <div class="modal-meta-item">
                        <div class="modal-meta-label">Size</div>
                        <div class="modal-meta-value" id="modalSize"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        AWS S3 • Express API • Make.com Automation • UFC5 Archive
    </div>

    <script>
        const API_BASE = window.location.origin === 'file://' 
            ? 'http://localhost:3000' 
            : window.location.origin;

        let videos = [];

        // Initialize
        async function init() {
            await loadVideos();
        }

        async function loadVideos() {
            try {
                document.getElementById('loading').style.display = 'flex';
                
                const response = await fetch(`${API_BASE}/api/videos`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                videos = await response.json();
                renderVideos();
                updateStats();

            } catch (error) {
                console.error('Error loading videos:', error);
                showMessage(`Error: ${error.message}`, 'error');
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderVideos() {
            const grid = document.getElementById('videosGrid');
            const emptyState = document.getElementById('emptyState');

            if (videos.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.innerHTML = videos.map((video, index) => `
                <div class="video-card" onclick="playVideo(${index})">
                    <div class="video-thumbnail">
                        <div class="play-button"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.filename}</div>
                        <div class="video-meta">
                            <div class="video-date">📅 ${formatDate(video.last_modified)}</div>
                            <div class="video-size">💾 ${formatSize(video.size_bytes)}</div>
                        </div>
                    </div>
                </div>
            `).join('');

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
        }

        function updateStats() {
            const totalVideos = videos.length;
            const totalSize = videos.reduce((sum, v) => sum + v.size_bytes, 0);
            const lastVideo = videos[0];

            document.getElementById('totalVideos').textContent = totalVideos;
            document.getElementById('totalSize').textContent = (totalSize / 1024 / 1024 / 1024).toFixed(2) + ' GB';
            document.getElementById('lastUpdated').textContent = lastVideo ? formatDate(lastVideo.last_modified) : '—';
        }

        async function playVideo(index) {
            const video = videos[index];
            const modal = document.getElementById('playerModal');
            const videoPlayer = document.getElementById('videoPlayer');

            try {
                // Get presigned URL from backend
                const response = await fetch(`${API_BASE}/api/video-url?key=${encodeURIComponent(video.key)}`);
                
                if (!response.ok) {
                    throw new Error('Failed to get video URL');
                }

                const data = await response.json();

                // Update modal
                document.getElementById('modalTitle').textContent = video.filename;
                document.getElementById('modalDate').textContent = formatDate(video.last_modified);
                document.getElementById('modalSize').textContent = formatSize(video.size_bytes);

                // Play video
                videoPlayer.src = data.url;
                modal.classList.add('active');

                // Mark card as active
                document.querySelectorAll('.video-card').forEach((card, i) => {
                    card.classList.toggle('active', i === index);
                });

            } catch (error) {
                console.error('Error playing video:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        function closeModal() {
            const modal = document.getElementById('playerModal');
            const videoPlayer = document.getElementById('videoPlayer');
            videoPlayer.pause();
            videoPlayer.src = '';
            modal.classList.remove('active');
            document.querySelectorAll('.video-card').forEach(card => {
                card.classList.remove('active');
            });
        }

        function showMessage(text, type = 'info') {
            const container = document.getElementById('messageContainer');
            const className = type === 'error' ? 'error-message' : 'success-message';
            container.innerHTML = `<div class="${className}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // Utility functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function formatSize(bytes) {
            if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(1) + ' KB';
            } else if (bytes < 1024 * 1024 * 1024) {
                return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            } else {
                return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
            }
        }

        // Keyboard close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Load on page load
        window.addEventListener('load', init);
    </script>
</body>
</html>
